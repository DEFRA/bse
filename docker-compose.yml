version: "3.9"

services:

  bse:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: bse-system:latest
    ports:
      - "5050:8080"
    environment:
      # ── Database ────────────────────────────────────────────────────────
      BSE_CONNECTION_STRING: "Server=sqlserver;Database=BSESystem;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;"
      # ── Redis ───────────────────────────────────────────────────────────
      BSE_REDIS_CONNECTION: "redis:6379"
      # ── OIDC (replace with real IdP values for production) ──────────────
      OIDC_AUTHORITY: "${OIDC_AUTHORITY:-https://login.microsoftonline.com/common}"
      OIDC_CLIENT_ID: "${OIDC_CLIENT_ID:-00000000-0000-0000-0000-000000000000}"
      OIDC_CLIENT_SECRET: "${OIDC_CLIENT_SECRET:-change-me}"
      # ── SMTP (BSE.Modules.AdnsExport) ───────────────────────────────────
      BSE_SMTP_HOST: "${BSE_SMTP_HOST:-localhost}"
      BSE_SMTP_PORT: "${BSE_SMTP_PORT:-25}"
      # ── ASP.NET Core ─────────────────────────────────────────────────────
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      SA_PASSWORD: "${SA_PASSWORD:-DevPassword!1}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Developer"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "$${SA_PASSWORD}" -No -Q "SELECT 1" || exit 1
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  sqlserver-data:
  redis-data:
